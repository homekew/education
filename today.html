<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Today's Plan — Carr Kids HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- PIN GATE STYLES -->
  <style>
    #pin-gate { position:fixed;inset:0;z-index:9999;background:#FAF7F1;display:flex;align-items:center;justify-content:center;font-family:'Epilogue',sans-serif; }
    #pin-gate.hidden { display:none; }
    .pin-box { text-align:center;background:#fff;border:1px solid #DDD4C4;border-radius:12px;padding:48px 40px 40px;width:320px;box-shadow:0 4px 32px rgba(42,33,24,0.08); }
    .pin-logo { width:10px;height:10px;background:#ff1e3c;border-radius:50%;display:inline-block;margin-bottom:16px; }
    .pin-title { font-family:'Fraunces',serif;font-size:1.3rem;font-weight:500;color:#2A2118;margin-bottom:6px; }
    .pin-sub { font-size:0.8rem;color:#9A8F81;margin-bottom:28px; }
    #pin-input { width:100%;padding:11px 14px;font-size:1.4rem;letter-spacing:8px;text-align:center;border:1px solid #DDD4C4;border-radius:6px;background:#FAF7F1;color:#2A2118;font-family:'Epilogue',sans-serif;outline:none;margin-bottom:14px;transition:border-color 0.15s; }
    #pin-input:focus { border-color:#d2c35a; }
    #pin-input.error { border-color:#ff1e3c;animation:shake 0.3s; }
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    #pin-btn { width:100%;padding:10px;background:#2A2118;color:#fff;border:none;border-radius:6px;font-family:'Epilogue',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:background 0.15s; }
    #pin-btn:hover { background:#5C4F3D; }
  </style>

  <style>
    :root {
      --linen:      #FAF7F1;
      --linen-dark: #F0EBE0;
      --linen-deep: #DDD4C4;
      --terra:      #ff1e3c;
      --terra-bg:   #fff0f2;
      --terra-soft: #ffb3bc;
      --sage:       #d2c35a;
      --sage-bg:    #faf8e8;
      --sage-soft:  #ece8b0;
      --sky:        #7FA3B5;
      --sky-bg:     #EBF3F7;
      --ink:        #2A2118;
      --ink-soft:   #5C4F3D;
      --ink-muted:  #9A8F81;
      --white:      #FFFFFF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Epilogue', sans-serif;
      background: var(--linen);
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='500' height='400'><g fill='none' stroke='%23d2c35a' stroke-width='1.5' opacity='0.22'><path d='M 62.0,24.0 L 58.9,33.7 L 48.7,33.7 L 56.9,39.6 L 53.8,49.3 L 62.0,43.3 L 70.2,49.3 L 67.1,39.6 L 75.3,33.7 L 65.1,33.7 Z'/> <path d='M 140.0,71.0 L 138.0,77.2 L 131.4,77.2 L 136.7,81.1 L 134.7,87.3 L 140.0,83.4 L 145.3,87.3 L 143.3,81.1 L 148.6,77.2 L 142.0,77.2 Z'/> <path d='M 220.0,14.0 L 217.5,21.6 L 209.5,21.6 L 216.0,26.3 L 213.5,33.9 L 220.0,29.2 L 226.5,33.9 L 224.0,26.3 L 230.5,21.6 L 222.5,21.6 Z'/> <path d='M 310.0,53.0 L 308.4,57.8 L 303.3,57.8 L 307.5,60.8 L 305.9,65.7 L 310.0,62.7 L 314.1,65.7 L 312.5,60.8 L 316.7,57.8 L 311.6,57.8 Z'/> <path d='M 390.0,22.0 L 387.1,31.0 L 377.6,31.0 L 385.3,36.5 L 382.4,45.5 L 390.0,39.9 L 397.6,45.5 L 394.7,36.5 L 402.4,31.0 L 392.9,31.0 Z'/> <path d='M 460.0,82.0 L 458.2,87.5 L 452.4,87.5 L 457.1,90.9 L 455.3,96.5 L 460.0,93.0 L 464.7,96.5 L 462.9,90.9 L 467.6,87.5 L 461.8,87.5 Z'/> <path d='M 30.0,133.0 L 28.4,137.8 L 23.3,137.8 L 27.5,140.8 L 25.9,145.7 L 30.0,142.7 L 34.1,145.7 L 32.5,140.8 L 36.7,137.8 L 31.6,137.8 Z'/> <path d='M 100.0,158.0 L 97.3,166.3 L 88.6,166.3 L 95.7,171.4 L 92.9,179.7 L 100.0,174.6 L 107.1,179.7 L 104.3,171.4 L 111.4,166.3 L 102.7,166.3 Z'/> <path d='M 185.0,122.0 L 183.2,127.5 L 177.4,127.5 L 182.1,130.9 L 180.3,136.5 L 185.0,133.0 L 189.7,136.5 L 187.9,130.9 L 192.6,127.5 L 186.8,127.5 Z'/> <path d='M 265.0,155.0 L 262.8,161.9 L 255.5,161.9 L 261.4,166.2 L 259.1,173.1 L 265.0,168.8 L 270.9,173.1 L 268.6,166.2 L 274.5,161.9 L 267.2,161.9 Z'/> <path d='M 350.0,138.0 L 348.4,142.8 L 343.3,142.8 L 347.5,145.8 L 345.9,150.7 L 350.0,147.7 L 354.1,150.7 L 352.5,145.8 L 356.7,142.8 L 351.6,142.8 Z'/> <path d='M 430.0,149.0 L 427.5,156.6 L 419.5,156.6 L 426.0,161.3 L 423.5,168.9 L 430.0,164.2 L 436.5,168.9 L 434.0,161.3 L 440.5,156.6 L 432.5,156.6 Z'/> <path d='M 75.0,241.0 L 73.0,247.2 L 66.4,247.2 L 71.7,251.1 L 69.7,257.3 L 75.0,253.4 L 80.3,257.3 L 78.3,251.1 L 83.6,247.2 L 77.0,247.2 Z'/> <path d='M 160.0,267.0 L 157.1,276.0 L 147.6,276.0 L 155.3,281.5 L 152.4,290.5 L 160.0,284.9 L 167.6,290.5 L 164.7,281.5 L 172.4,276.0 L 162.9,276.0 Z'/> <path d='M 240.0,233.0 L 238.4,237.8 L 233.3,237.8 L 237.5,240.8 L 235.9,245.7 L 240.0,242.7 L 244.1,245.7 L 242.5,240.8 L 246.7,237.8 L 241.6,237.8 Z'/> <path d='M 320.0,260.0 L 317.8,266.9 L 310.5,266.9 L 316.4,271.2 L 314.1,278.1 L 320.0,273.8 L 325.9,278.1 L 323.6,271.2 L 329.5,266.9 L 322.2,266.9 Z'/> <path d='M 410.0,247.0 L 408.2,252.5 L 402.4,252.5 L 407.1,255.9 L 405.3,261.5 L 410.0,258.0 L 414.7,261.5 L 412.9,255.9 L 417.6,252.5 L 411.8,252.5 Z'/> <path d='M 480.0,268.0 L 477.3,276.3 L 468.6,276.3 L 475.7,281.4 L 472.9,289.7 L 480.0,284.6 L 487.1,289.7 L 484.3,281.4 L 491.4,276.3 L 482.7,276.3 Z'/> <path d='M 45.0,329.0 L 42.5,336.6 L 34.5,336.6 L 41.0,341.3 L 38.5,348.9 L 45.0,344.2 L 51.5,348.9 L 49.0,341.3 L 55.5,336.6 L 47.5,336.6 Z'/> <path d='M 130.0,363.0 L 128.4,367.8 L 123.3,367.8 L 127.5,370.8 L 125.9,375.7 L 130.0,372.7 L 134.1,375.7 L 132.5,370.8 L 136.7,367.8 L 131.6,367.8 Z'/> <path d='M 210.0,336.0 L 208.0,342.2 L 201.4,342.2 L 206.7,346.1 L 204.7,352.3 L 210.0,348.4 L 215.3,352.3 L 213.3,346.1 L 218.6,342.2 L 212.0,342.2 Z'/> <path d='M 295.0,367.0 L 292.1,376.0 L 282.6,376.0 L 290.3,381.5 L 287.4,390.5 L 295.0,384.9 L 302.6,390.5 L 299.7,381.5 L 307.4,376.0 L 297.9,376.0 Z'/> <path d='M 375.0,343.0 L 373.4,347.8 L 368.3,347.8 L 372.5,350.8 L 370.9,355.7 L 375.0,352.7 L 379.1,355.7 L 377.5,350.8 L 381.7,347.8 L 376.6,347.8 Z'/> <path d='M 455.0,355.0 L 452.8,361.9 L 445.5,361.9 L 451.4,366.2 L 449.1,373.1 L 455.0,368.8 L 460.9,373.1 L 458.6,366.2 L 464.5,361.9 L 457.2,361.9 Z'/></g></svg>");
      background-size: 500px 400px;
      background-repeat: repeat;
      color: var(--ink);
      line-height: 1.6;
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    .site-nav {
      background: var(--white);
      border-bottom: 1px solid var(--linen-deep);
      padding: 0 40px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .nav-brand {
      font-family: 'Fraunces', serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .nav-dot {
      width: 8px; height: 8px;
      background: var(--terra);
      border-radius: 50%;
      display: inline-block;
    }
    .site-nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }
    .site-nav-links a {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .site-nav-links a:hover { color: var(--terra); }
    .nav-active { color: var(--terra) !important; }

    /* TEACHER PANEL */
    #teacher-panel {
      background: #fffbe6;
      border-bottom: 2px solid var(--sage);
      padding: 12px 40px;
      display: none;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 0.82rem;
    }
    #teacher-panel.visible { display: flex; }
    #teacher-panel strong { color: var(--ink); font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase; }
    #teacher-panel label { color: var(--ink-soft); font-size: 0.8rem; }
    #teacher-panel input[type="date"] {
      padding: 5px 10px;
      border: 1px solid var(--linen-deep);
      border-radius: 5px;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.82rem;
      background: var(--white);
      color: var(--ink);
    }
    .teacher-btn {
      padding: 5px 14px;
      border-radius: 5px;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--linen-deep);
      background: var(--white);
      color: var(--ink-soft);
      transition: all 0.15s;
    }
    .teacher-btn:hover { background: var(--linen-dark); }
    .teacher-btn.undo {
      border-color: var(--terra-soft);
      color: var(--terra);
    }
    .teacher-btn.undo:hover { background: var(--terra-bg); }
    .teacher-btn.exit {
      border-color: var(--ink);
      color: var(--ink);
      margin-left: auto;
    }

    /* PAGE HEADER */
    .page-header {
      background: var(--white);
      border-bottom: 1px solid var(--linen-deep);
      padding: 28px 40px 24px;
    }
    .page-header-eyebrow {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--terra);
      margin-bottom: 6px;
    }
    .page-header h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.7rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .page-header-date {
      font-size: 0.85rem;
      color: var(--ink-muted);
    }

    /* WEEK BADGE STRIP */
    .week-strip {
      background: var(--linen-dark);
      border-bottom: 1px solid var(--linen-deep);
      padding: 10px 40px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .week-strip-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--ink-soft);
    }
    .week-strip-badge .badge-label {
      font-size: 0.63rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .week-strip-badge .badge-val {
      font-weight: 600;
      color: var(--ink);
    }
    .strip-sep {
      color: var(--linen-deep);
      font-size: 1rem;
    }

    /* SETUP BANNER */
    .setup-banner {
      background: var(--sage-bg);
      border: 1px solid var(--sage-soft);
      border-radius: 10px;
      padding: 24px 28px;
      margin: 32px 40px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .setup-banner p {
      font-size: 0.9rem;
      color: var(--ink-soft);
      margin-bottom: 10px;
    }
    .setup-banner label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink);
      display: block;
      margin-bottom: 6px;
    }
    .setup-banner input[type="date"] {
      padding: 8px 12px;
      border: 1px solid var(--linen-deep);
      border-radius: 6px;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.9rem;
      background: var(--white);
      color: var(--ink);
      margin-right: 10px;
    }
    .btn-primary {
      padding: 9px 22px;
      background: var(--ink);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--ink-soft); }

    /* STATUS MESSAGE */
    .status-msg {
      text-align: center;
      padding: 60px 40px;
    }
    .status-msg .emoji { font-size: 2.5rem; margin-bottom: 16px; }
    .status-msg h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .status-msg p { font-size: 0.9rem; color: var(--ink-muted); }

    /* MAIN */
    main { flex: 1; padding: 28px 40px 60px; }

    /* CARDS ROW */
    .cards-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    @media (max-width: 720px) {
      .cards-row { flex-direction: column; }
      main { padding: 20px 20px 40px; }
      .site-nav { padding: 0 20px; }
      .page-header { padding: 20px 20px 18px; }
      .week-strip { padding: 10px 20px; }
    }

    /* GRADE CARD */
    .grade-card {
      flex: 1;
      background: var(--white);
      border: 1px solid var(--linen-deep);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(42,33,24,0.06);
    }

    .card-header {
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }
    .card-header.terra { background: var(--terra); }
    .card-header.sky   { background: var(--sky); }
    .card-grade-label {
      font-family: 'Epilogue', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
    }
    .card-header-meta {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.8);
      font-weight: 400;
    }

    /* PROGRESS BAR */
    .card-progress-bar {
      height: 4px;
      background: rgba(0,0,0,0.12);
    }
    .card-progress-bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.55);
      transition: width 0.4s ease;
    }

    .card-body { padding: 20px; }

    .card-week-title {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .card-day-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .card-day-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink-soft);
    }
    .tag-pill {
      display: inline-block;
      border-radius: 4px;
      padding: 2px 9px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: capitalize;
    }
    .tag-reading  { background: var(--sage-bg); color: #7a6e1a; }
    .tag-writing  { background: var(--terra-bg); color: var(--terra); }
    .tag-grammar  { background: var(--sky-bg); color: var(--sky); }
    .tag-research { background: var(--linen-dark); color: var(--ink-soft); }
    .tag-project  { background: #f0ece8; color: var(--ink-soft); }
    .tag-making   { background: #f0ece8; color: var(--ink-soft); }
    .tag-revision { background: var(--sky-bg); color: var(--sky); }
    .tag-sharing  { background: var(--linen-deep); color: var(--ink-soft); }

    .card-task {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--ink-soft);
      margin-bottom: 18px;
      padding: 14px 16px;
      background: var(--linen);
      border-radius: 8px;
      border-left: 3px solid var(--linen-deep);
    }

    /* CHECKBOXES */
    .card-checks {
      list-style: none;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-checks li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.84rem;
      color: var(--ink-soft);
      cursor: pointer;
      user-select: none;
    }
    .card-checks li .cb {
      width: 18px; height: 18px;
      border: 2px solid var(--linen-deep);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .card-checks li.checked .cb {
      background: var(--sage);
      border-color: var(--sage);
      color: #fff;
      font-size: 0.7rem;
    }
    .card-checks li:hover .cb { border-color: var(--sage); }

    /* DONE BUTTON */
    .btn-done {
      width: 100%;
      padding: 12px;
      background: var(--terra);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 12px;
    }
    .btn-done:hover { background: #e0001f; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,30,60,0.25); }

    /* CARD LINK */
    .card-unit-link {
      display: inline-block;
      font-size: 0.78rem;
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .card-unit-link:hover { color: var(--terra); }

    /* DONE STATE */
    .done-state { padding: 0; }
    .done-check-big {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .done-title {
      font-family: 'Fraunces', serif;
      font-size: 1.05rem;
      font-weight: 500;
      color: #4a7c4a;
      margin-bottom: 16px;
    }
    .done-tomorrow-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 6px;
    }
    .done-tomorrow-task {
      font-size: 0.85rem;
      color: var(--ink-soft);
      line-height: 1.65;
      padding: 12px 14px;
      background: var(--sage-bg);
      border-radius: 6px;
      border-left: 3px solid var(--sage-soft);
      margin-bottom: 14px;
    }
    .done-msg {
      font-size: 0.82rem;
      color: var(--ink-muted);
    }

    /* FOOTER */
    .site-footer {
      border-top: 1px solid var(--linen-deep);
      background: var(--white);
      padding: 18px 40px;
      font-size: 0.78rem;
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .site-footer a {
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .site-footer a:hover { color: var(--terra); }
    #teacher-toggle { font-size: 0.78rem; }
  </style>
</head>
<body>

<!-- PIN GATE -->
<div id="pin-gate">
  <div class="pin-box">
    <div class="pin-logo"></div>
    <div class="pin-title">Carr Kids HQ</div>
    <div class="pin-sub">Enter your PIN to continue</div>
    <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="····" autocomplete="off">
    <button id="pin-btn">Enter</button>
  </div>
</div>

<!-- TEACHER PANEL -->
<div id="teacher-panel">
  <strong>&#128105;&#8205;&#127979; Teacher Mode</strong>
  <span style="color:var(--linen-deep)">|</span>

(function(){

  var input = document.getElementById('pin-input');
  var btn   = document.getElementById('pin-btn');
  if (sessionStorage.getItem('ck_auth') === '1') { gate.classList.add('hidden'); return; }

      sessionStorage.setItem('ck_auth', '1');
      gate.classList.add('hidden');
    } else {
      input.classList.add('error');
      input.value = '';
      setTimeout(function(){ input.classList.remove('error'); }, 400);
    }
  }
  btn.addEventListener('click', check);
  input.addEventListener('keydown', function(e){ if (e.key === 'Enter') check(); });
  input.focus();
})();

// ─── UTILITIES ────────────────────────────────────────────────────────────────
const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function formatDateFull(d) {
  return DOW_FULL[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function todayLocal() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

function parseLocalDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function countSchoolDays(start, end) {
  // Count Mon-Fri days from start up to and including end
  let count = 0;
  let cur = new Date(start);
  while (cur <= end) {
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) count++;
    cur = new Date(cur.getTime() + 86400000);
  }
  return count;
}

function addSchoolDays(start, n) {
  // Return the date that is n school days after start (0 = start itself if school day)
  let count = 0;
  let cur = new Date(start);
  while (true) {
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) {
      if (count === n) return cur;
      count++;
    }
    cur = new Date(cur.getTime() + 86400000);
  }
}

function getTagClass(tag) {
  const map = {
    reading: 'tag-reading', writing: 'tag-writing', grammar: 'tag-grammar',
    research: 'tag-research', project: 'tag-project', making: 'tag-making',
    revision: 'tag-revision', sharing: 'tag-sharing'
  };
  return map[tag] || 'tag-project';
}

function todayKey() {
  const t = todayLocal();
  const y = t.getFullYear();
  const m = String(t.getMonth()+1).padStart(2,'0');
  const d = String(t.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + d;
}

// ─── RENDERING ────────────────────────────────────────────────────────────────
function renderGradeCard(grade, weekObj, dayIdx, schoolDayIdx, totalDays, isDone) {
  const grKey = 'ck_' + grade + '_done_' + todayKey();
  const color  = (grade === 'gr6') ? 'terra' : 'sky';
  const label  = (grade === 'gr6') ? '6TH GRADE' : '8TH GRADE';
  const dayName = DAY_NAMES[dayIdx];
  const day = weekObj.days[dayIdx];
  const progress = Math.round((schoolDayIdx / (totalDays - 1)) * 100);

  // Tomorrow preview
  const nextDayIdx = dayIdx + 1;
  let tomorrowHtml = '';
  if (nextDayIdx < 5) {
    const nd = weekObj.days[nextDayIdx];
    tomorrowHtml = `<div class="done-tomorrow-label">Coming up ${DAY_NAMES[nextDayIdx]}:</div>
    <div class="done-tomorrow-task"><span class="tag-pill ${getTagClass(nd.tag)}">${nd.tag}</span><br><br>${nd.task}</div>`;
  } else {
    tomorrowHtml = `<div class="done-tomorrow-task" style="background:var(--linen-dark);border-color:var(--linen-deep)">No school tomorrow — have a great weekend! &#127881;</div>`;
  }

  const weekNum  = weekObj.unit * 6 - 5 + (weekObj.weekAnchor.replace(/#w?eek?/,'').replace('#','') - 1);
  // simpler: unit (1-6) and week within unit
  const unitNum = weekObj.unit;
  const weekWithinUnit = parseInt((weekObj.weekAnchor.replace(/[^0-9]/g,''))) || 1;

  const cardBody = isDone
    ? `<div class="done-state">
        <div class="done-check-big">&#10003;</div>
        <div class="done-title">${dayName} complete!</div>
        ${tomorrowHtml}
        <div class="done-msg">Great work today! &#127881;</div>
      </div>`
    : `<div class="card-day-row">
        <span class="card-day-name">${dayName}</span>
        <span class="tag-pill ${getTagClass(day.tag)}">${day.tag}</span>
      </div>
      <div class="card-task">${day.task}</div>
      <ul class="card-checks" id="${grade}-checks">
        <li onclick="toggleCheck(this)"><span class="cb"></span> I've started</li>
        <li onclick="toggleCheck(this)"><span class="cb"></span> Working on it</li>
        <li onclick="toggleCheck(this)"><span class="cb"></span> Wrapping up</li>
      </ul>
      <button class="btn-done" onclick="markDone('${grade}')">&#10003; Done for Today</button>
      <br>
      <a class="card-unit-link" href="${weekObj.unitFile}${weekObj.weekAnchor}">View Unit ${unitNum} &rarr;</a>`;

  return `<div class="grade-card" id="card-${grade}">
    <div class="card-header ${color}">
      <span class="card-grade-label">${label}</span>
      <span class="card-header-meta">Unit ${unitNum} of 6 &middot; Week ${weekWithinUnit} of 6</span>
    </div>
    <div class="card-progress-bar">
      <div class="card-progress-bar-fill" style="width:${progress}%"></div>
    </div>
    <div class="card-body">
      <div class="card-week-title">${weekObj.weekTitle}</div>
      ${cardBody}
    </div>
  </div>`;
}

function toggleCheck(el) {
  el.classList.toggle('checked');
  if (el.classList.contains('checked')) {
    el.querySelector('.cb').textContent = '✓';
  } else {
    el.querySelector('.cb').textContent = '';
  }
}

function markDone(grade) {
  const key = 'ck_' + grade + '_done_' + todayKey();
  localStorage.setItem(key, '1');
  renderPage();
  updateTeacherUndoButtons();
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function renderPage() {
  const main = document.getElementById('main-content');
  const strip = document.getElementById('week-strip');
  const today = todayLocal();

  // Update date display
  document.getElementById('today-date-display').textContent = formatDateFull(today);

  // Check school year start
  const startStr = localStorage.getItem('ck_year_start');
  if (!startStr) {
    strip.style.display = 'none';
    main.innerHTML = renderSetupBanner();
    return;
  }

  const start = parseLocalDate(startStr);
  const dow = today.getDay(); // 0=Sun, 6=Sat

  // Before school starts
  if (today < start) {
    strip.style.display = 'none';
    const diffMs = start - today;
    const diffDays = Math.ceil(diffMs / 86400000);
    main.innerHTML = `<div class="status-msg"><div class="emoji">&#128197;</div>
      <h2>School starts ${MONTHS[start.getMonth()]} ${start.getDate()}, ${start.getFullYear()}</h2>
      <p>${diffDays} day${diffDays !== 1 ? 's' : ''} to go — enjoy the break!</p></div>`;
    return;
  }

  // Weekend
  if (dow === 0 || dow === 6) {
    strip.style.display = 'none';
    main.innerHTML = `<div class="status-msg"><div class="emoji">&#127881;</div>
      <h2>Weekend — no school today!</h2>
      <p>Rest up and come back Monday ready to go.</p></div>`;
    return;
  }

  // Count school days elapsed
  const schoolDayIndex = countSchoolDays(start, today) - 1; // 0-based

  if (schoolDayIndex > 179) {
    strip.style.display = 'none';
    main.innerHTML = `<div class="status-msg"><div class="emoji">&#127881;</div>
      <h2>You finished the school year!</h2>
      <p>Incredible work this year. Time to celebrate!</p></div>`;
    return;
  }

  // Calculate unit/week/day indices
  const weekIndex       = Math.floor(schoolDayIndex / 5);   // 0-35
  const unitIndex       = Math.floor(weekIndex / 6);        // 0-5
  const weekWithinUnit  = weekIndex % 6;                    // 0-5
  const dayOfWeek       = schoolDayIndex % 5;               // 0=Mon

  const gr6Week = CURR.gr6[weekIndex];
  const gr8Week = CURR.gr8[weekIndex];

  // Week strip
  strip.style.display = 'flex';
  document.getElementById('strip-week').textContent = (weekIndex + 1) + ' of 36';
  document.getElementById('strip-unit').textContent = (unitIndex + 1) + ' of 6';
  document.getElementById('strip-unit-name').textContent = gr8Week.unitName; // use gr8 unit name for the strip (or we can show both)
  document.getElementById('strip-day-num').textContent = (schoolDayIndex + 1) + ' of 180';

  // Done states
  const gr6Done = !!localStorage.getItem('ck_gr6_done_' + todayKey());
  const gr8Done = !!localStorage.getItem('ck_gr8_done_' + todayKey());

  // Render
  main.innerHTML = `<div class="cards-row">
    ${renderGradeCard('gr6', gr6Week, dayOfWeek, schoolDayIndex, 180, gr6Done)}
    ${renderGradeCard('gr8', gr8Week, dayOfWeek, schoolDayIndex, 180, gr8Done)}
  </div>`;
}

function renderSetupBanner() {
  return `<div class="setup-banner">
    <div>
      <p>Before we start, when does your school year begin?</p>
      <label for="setup-date">School year start date</label>
      <input type="date" id="setup-date" value="2026-01-05">
      <button class="btn-primary" onclick="saveStartDate()">Start School Year</button>
    </div>
  </div>`;
}

function saveStartDate() {
  const val = document.getElementById('setup-date').value;
  if (val) {
    localStorage.setItem('ck_year_start', val);

}

document.getElementById('teacher-toggle').addEventListener('click', function(e) {
  e.preventDefault();
  if (sessionStorage.getItem('ck_teacher') === '1') {
    const panel = document.getElementById('teacher-panel');
    panel.classList.toggle('visible');
    return;
  }
  const pin = window.prompt('Enter teacher PIN:');
  if (pin === '1899') {
    sessionStorage.setItem('ck_teacher', '1');
    const panel = document.getElementById('teacher-panel');
    panel.classList.add('visible');
    updateTeacherPanel();
  }
});

document.getElementById('t-exit').addEventListener('click', function() {
  sessionStorage.removeItem('ck_teacher');
  document.getElementById('teacher-panel').classList.remove('visible');

// If already in teacher mode from a previous page load in this session
if (sessionStorage.getItem('ck_teacher') === '1') {
  document.getElementById('teacher-panel').classList.add('visible');
  updateTeacherPanel();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderPage();
