<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>This Week — Carr Kids HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- PIN GATE STYLES -->
  <style>
    #pin-gate { position:fixed;inset:0;z-index:9999;background:#FAF7F1;display:flex;align-items:center;justify-content:center;font-family:'Epilogue',sans-serif; }
    #pin-gate.hidden { display:none; }
    .pin-box { text-align:center;background:#fff;border:1px solid #DDD4C4;border-radius:12px;padding:48px 40px 40px;width:320px;box-shadow:0 4px 32px rgba(42,33,24,0.08); }
    .pin-logo { width:10px;height:10px;background:#ff1e3c;border-radius:50%;display:inline-block;margin-bottom:16px; }
    .pin-title { font-family:'Fraunces',serif;font-size:1.3rem;font-weight:500;color:#2A2118;margin-bottom:6px; }
    .pin-sub { font-size:0.8rem;color:#9A8F81;margin-bottom:28px; }
    #pin-input { width:100%;padding:11px 14px;font-size:1.4rem;letter-spacing:8px;text-align:center;border:1px solid #DDD4C4;border-radius:6px;background:#FAF7F1;color:#2A2118;font-family:'Epilogue',sans-serif;outline:none;margin-bottom:14px;transition:border-color 0.15s; }
    #pin-input:focus { border-color:#d2c35a; }
    #pin-input.error { border-color:#ff1e3c;animation:shake 0.3s; }
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    #pin-btn { width:100%;padding:10px;background:#2A2118;color:#fff;border:none;border-radius:6px;font-family:'Epilogue',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:background 0.15s; }
    #pin-btn:hover { background:#5C4F3D; }
  </style>

  <style>
    :root {
      --linen:      #FAF7F1;
      --linen-dark: #F0EBE0;
      --linen-deep: #DDD4C4;
      --terra:      #ff1e3c;
      --terra-bg:   #fff0f2;
      --terra-soft: #ffb3bc;
      --sage:       #d2c35a;
      --sage-bg:    #faf8e8;
      --sage-soft:  #ece8b0;
      --sky:        #7FA3B5;
      --sky-bg:     #EBF3F7;
      --ink:        #2A2118;
      --ink-soft:   #5C4F3D;
      --ink-muted:  #9A8F81;
      --white:      #FFFFFF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Epilogue', sans-serif;
      background: var(--linen);
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='500' height='400'><g fill='none' stroke='%23d2c35a' stroke-width='1.5' opacity='0.22'><path d='M 62.0,24.0 L 58.9,33.7 L 48.7,33.7 L 56.9,39.6 L 53.8,49.3 L 62.0,43.3 L 70.2,49.3 L 67.1,39.6 L 75.3,33.7 L 65.1,33.7 Z'/> <path d='M 140.0,71.0 L 138.0,77.2 L 131.4,77.2 L 136.7,81.1 L 134.7,87.3 L 140.0,83.4 L 145.3,87.3 L 143.3,81.1 L 148.6,77.2 L 142.0,77.2 Z'/> <path d='M 220.0,14.0 L 217.5,21.6 L 209.5,21.6 L 216.0,26.3 L 213.5,33.9 L 220.0,29.2 L 226.5,33.9 L 224.0,26.3 L 230.5,21.6 L 222.5,21.6 Z'/> <path d='M 310.0,53.0 L 308.4,57.8 L 303.3,57.8 L 307.5,60.8 L 305.9,65.7 L 310.0,62.7 L 314.1,65.7 L 312.5,60.8 L 316.7,57.8 L 311.6,57.8 Z'/> <path d='M 390.0,22.0 L 387.1,31.0 L 377.6,31.0 L 385.3,36.5 L 382.4,45.5 L 390.0,39.9 L 397.6,45.5 L 394.7,36.5 L 402.4,31.0 L 392.9,31.0 Z'/> <path d='M 460.0,82.0 L 458.2,87.5 L 452.4,87.5 L 457.1,90.9 L 455.3,96.5 L 460.0,93.0 L 464.7,96.5 L 462.9,90.9 L 467.6,87.5 L 461.8,87.5 Z'/></g></svg>");
      background-size: 500px 400px;
      background-repeat: repeat;
      color: var(--ink);
      line-height: 1.6;
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    .site-nav {
      background: var(--white);
      border-bottom: 1px solid var(--linen-deep);
      padding: 0 40px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .nav-brand {
      font-family: 'Fraunces', serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .nav-dot {
      width: 8px; height: 8px;
      background: var(--terra);
      border-radius: 50%;
      display: inline-block;
    }
    .site-nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }
    .site-nav-links a {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .site-nav-links a:hover { color: var(--terra); }
    .nav-active { color: var(--terra) !important; }

    /* TEACHER PANEL */
    #teacher-panel {
      background: #fffbe6;
      border-bottom: 2px solid var(--sage);
      padding: 12px 40px;
      display: none;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 0.82rem;
    }
    #teacher-panel.visible { display: flex; }
    #teacher-panel strong { color: var(--ink); font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase; }
    #teacher-panel label { color: var(--ink-soft); font-size: 0.8rem; }
    #teacher-panel input[type="date"] {
      padding: 5px 10px;
      border: 1px solid var(--linen-deep);
      border-radius: 5px;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.82rem;
      background: var(--white);
      color: var(--ink);
    }
    .teacher-btn {
      padding: 5px 14px;
      border-radius: 5px;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--linen-deep);
      background: var(--white);
      color: var(--ink-soft);
      transition: all 0.15s;
    }
    .teacher-btn:hover { background: var(--linen-dark); }
    .teacher-btn.exit {
      border-color: var(--ink);
      color: var(--ink);
      margin-left: auto;
    }

    /* PAGE HEADER */
    .page-header {
      background: var(--white);
      border-bottom: 1px solid var(--linen-deep);
      padding: 28px 40px 20px;
    }
    .page-header-eyebrow {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--terra);
      margin-bottom: 6px;
    }
    .page-header h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.7rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .page-header-sub {
      font-size: 0.85rem;
      color: var(--ink-muted);
      margin-bottom: 16px;
    }

    /* WEEK NAVIGATION BAR */
    .week-nav-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .week-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--linen-deep);
      background: var(--white);
      color: var(--ink-soft);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    .week-nav-btn:hover { background: var(--linen-dark); border-color: var(--ink-muted); color: var(--ink); }
    .week-nav-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    .week-label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
      padding: 0 4px;
    }
    .week-range-text {
      font-size: 0.8rem;
      color: var(--ink-muted);
    }
    .today-btn {
      font-size: 0.75rem;
      color: var(--terra);
      background: var(--terra-bg);
      border-color: var(--terra-soft);
    }
    .today-btn:hover { background: #ffe4e8; }

    /* YEAR PROGRESS BAR */
    .year-progress-wrap {
      background: var(--white);
      border-bottom: 1px solid var(--linen-deep);
      padding: 10px 40px;
    }
    .year-progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .year-progress-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-muted);
      white-space: nowrap;
    }
    .year-progress-track {
      flex: 1;
      height: 6px;
      background: var(--linen-deep);
      border-radius: 3px;
      overflow: hidden;
    }
    .year-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--sage) 0%, var(--terra) 100%);
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .year-progress-pct {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--ink-soft);
      white-space: nowrap;
    }

    /* STATUS MESSAGE */
    .status-msg {
      text-align: center;
      padding: 60px 40px;
    }
    .status-msg .emoji { font-size: 2.5rem; margin-bottom: 16px; }
    .status-msg h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .status-msg p { font-size: 0.9rem; color: var(--ink-muted); }

    /* SETUP BANNER */
    .setup-banner {
      background: var(--sage-bg);
      border: 1px solid var(--sage-soft);
      border-radius: 10px;
      padding: 24px 28px;
      margin: 32px 40px;
    }
    .setup-banner p { font-size: 0.9rem; color: var(--ink-soft); margin-bottom: 10px; }
    .setup-banner label { font-size: 0.8rem; font-weight: 600; color: var(--ink); display: block; margin-bottom: 6px; }
    .setup-banner input[type="date"] {
      padding: 8px 12px;
      border: 1px solid var(--linen-deep);
      border-radius: 6px;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.9rem;
      background: var(--white);
      color: var(--ink);
      margin-right: 10px;
    }
    .btn-primary {
      padding: 9px 22px;
      background: var(--ink);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--ink-soft); }

    /* MAIN */
    main { flex: 1; padding: 28px 40px 60px; }

    /* GRADE SECTIONS */
    .grades-wrap {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    @media (max-width: 860px) {
      .grades-wrap { flex-direction: column; }
      main { padding: 20px 16px 40px; }
      .site-nav { padding: 0 16px; }
      .page-header { padding: 20px 16px 16px; }
      .year-progress-wrap { padding: 10px 16px; }
      .week-nav-bar { gap: 8px; }
    }

    /* WEEK TABLE CARD */
    .week-card {
      flex: 1;
      background: var(--white);
      border: 1px solid var(--linen-deep);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(42,33,24,0.06);
    }
    .week-card-header {
      padding: 14px 20px 12px;
    }
    .week-card-header.terra { background: var(--terra); }
    .week-card-header.sky   { background: var(--sky); }
    .week-card-grade {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      margin-bottom: 2px;
    }
    .week-card-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.85);
      font-weight: 400;
    }
    .week-card-unit-title {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
    }

    /* PROGRESS BAR */
    .card-progress-bar {
      height: 4px;
      background: rgba(0,0,0,0.12);
    }
    .card-progress-bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.55);
      transition: width 0.4s ease;
    }

    /* DAY TABLE */
    .day-table {
      width: 100%;
      border-collapse: collapse;
    }
    .day-table tr {
      border-bottom: 1px solid var(--linen-dark);
    }
    .day-table tr:last-child { border-bottom: none; }
    .day-table tr:nth-child(odd) { background: var(--white); }
    .day-table tr:nth-child(even) { background: var(--linen); }

    /* TODAY ROW */
    .day-table tr.is-today {
      background: var(--sage-bg) !important;
    }
    .day-table tr.is-today td:first-child {
      border-left: 3px solid var(--sage);
    }
    .week-card-header.terra ~ * .day-table tr.is-today td:first-child {
      border-left-color: var(--terra);
    }

    /* DONE ROW */
    .day-table tr.is-done .day-task-text {
      opacity: 0.5;
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }
    .day-table tr.is-done .day-name { opacity: 0.6; }

    /* TABLE CELLS */
    .day-table td {
      padding: 12px 14px;
      vertical-align: top;
    }
    .day-name-cell {
      width: 72px;
      min-width: 72px;
    }
    .day-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-soft);
      white-space: nowrap;
    }
    .done-check {
      display: block;
      font-size: 0.72rem;
      color: #4a7c4a;
      margin-top: 2px;
      font-weight: 600;
    }
    .tag-cell { width: 80px; min-width: 80px; padding-top: 14px; }
    .task-cell { padding-right: 8px; }
    .day-task-text {
      font-size: 0.83rem;
      color: var(--ink-soft);
      line-height: 1.6;
    }
    .link-cell { width: 36px; min-width: 36px; text-align: center; padding-top: 13px; }
    .open-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      background: var(--linen-dark);
      border-radius: 6px;
      color: var(--ink-muted);
      text-decoration: none;
      font-size: 0.8rem;
      transition: all 0.15s;
      font-weight: 600;
    }
    .open-link:hover { background: var(--linen-deep); color: var(--ink); }
    .week-card-header.terra + * .open-link:hover,
    .terra-card .open-link:hover { background: var(--terra-bg); color: var(--terra); }
    .sky-card .open-link:hover { background: var(--sky-bg); color: var(--sky); }

    /* TAG PILLS */
    .tag-pill {
      display: inline-block;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: capitalize;
      white-space: nowrap;
    }
    .tag-reading  { background: var(--sage-bg); color: #7a6e1a; }
    .tag-writing  { background: var(--terra-bg); color: var(--terra); }
    .tag-grammar  { background: var(--sky-bg); color: var(--sky); }
    .tag-research { background: var(--linen-dark); color: var(--ink-soft); }
    .tag-project  { background: #f0ece8; color: var(--ink-soft); }
    .tag-making   { background: #f0ece8; color: var(--ink-soft); }
    .tag-revision { background: var(--sky-bg); color: var(--sky); }
    .tag-sharing  { background: var(--linen-deep); color: var(--ink-soft); }
    .tag-art      { background: var(--sage-bg); color: #7a6e1a; }

    /* FOOTER */
    .site-footer {
      border-top: 1px solid var(--linen-deep);
      background: var(--white);
      padding: 18px 40px;
      font-size: 0.78rem;
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .site-footer a {
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .site-footer a:hover { color: var(--terra); }

    /* PREVIEW BANNER */
    .preview-banner {
      background: var(--terra-bg);
      border-bottom: 2px solid var(--terra-soft);
      padding: 8px 40px;
      font-size: 0.8rem;
      color: var(--terra);
      font-weight: 500;
      text-align: center;
    }
    .preview-banner.future {
      background: var(--sky-bg);
      border-bottom-color: var(--sky);
      color: var(--sky);
    }
  </style>
</head>

<script>
// ─── PIN GATE ─────────────────────────────────────────────────────────────────
(function(){
  var gate  = document.getElementById('pin-gate');
  var input = document.getElementById('pin-input');
  var btn   = document.getElementById('pin-btn');
  if (sessionStorage.getItem('ck_auth') === '1') { gate.classList.add('hidden'); return; }
  function check() {
    if (input.value === '1899') {
      sessionStorage.setItem('ck_auth', '1');
      gate.classList.add('hidden');
    } else {
      input.classList.add('error');
      input.value = '';
      setTimeout(function(){ input.classList.remove('error'); }, 400);
    }
  }
  btn.addEventListener('click', check);
  input.addEventListener('keydown', function(e){ if (e.key === 'Enter') check(); });
  input.focus();
})();

// ─── CURRICULUM DATA ──────────────────────────────────────────────────────────
const CURR = {
  gr6: [
    // Unit 1: Into the Wild (weeks 1-6)
    {
      unit: 1, unitName: "Into the Wild", weekTitle: "Introduction & Setup",
      unitFile: "la_unit1.html", weekAnchor: "#week1",
      days: [
        { tag: "reading",  task: "Choose your book from the list; read the opening chapter; write first impressions in your journal (Who do we meet? Where are we? What's the mood?)" },
        { tag: "research", task: "Look up your author; read a short bio. Write one paragraph: What inspired them? Does this change how you read the opening?" },

// ─── UTILITIES ────────────────────────────────────────────────────────────────
const DAY_NAMES  = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const MONTHS     = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_FULL   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function todayLocal() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}
function parseLocalDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}
function countSchoolDays(start, end) {
  let count = 0;
  let cur = new Date(start);
  while (cur <= end) {
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) count++;
    cur = new Date(cur.getTime() + 86400000);
  }
  return count;
}
function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}
function addDays(d, n) {
  return new Date(d.getTime() + n * 86400000);
}
function getMondayOf(d) {
  const dow = d.getDay(); // 0=Sun
  const diff = dow === 0 ? -6 : 1 - dow;
  return addDays(d, diff);
}
function getTagClass(tag) {
  const map = {
    reading:'tag-reading', writing:'tag-writing', grammar:'tag-grammar',
    research:'tag-research', project:'tag-project', making:'tag-making',
    revision:'tag-revision', sharing:'tag-sharing', art:'tag-art'
  };
  return map[tag] || 'tag-project';
}
function formatDateShort(d) {
  return MONTHS[d.getMonth()].slice(0,3) + ' ' + d.getDate();
}
function formatDateRange(mon, fri) {
  if (mon.getMonth() === fri.getMonth()) {
    return MONTHS[mon.getMonth()] + ' ' + mon.getDate() + '–' + fri.getDate() + ', ' + mon.getFullYear();
  }
  return MONTHS[mon.getMonth()].slice(0,3) + ' ' + mon.getDate() + ' – ' + MONTHS[fri.getMonth()].slice(0,3) + ' ' + fri.getDate() + ', ' + mon.getFullYear();
}

// ─── WEEK OFFSET STATE ────────────────────────────────────────────────────────
let weekOffset = 0;
try { weekOffset = parseInt(sessionStorage.getItem('ck_week_offset') || '0') || 0; } catch(e){}

function setOffset(n) {
  weekOffset = n;
  try { sessionStorage.setItem('ck_week_offset', String(n)); } catch(e) {}
  renderPage();
}

// ─── RENDERING ────────────────────────────────────────────────────────────────
function renderWeekTable(grade, weekObj, mondayDate, todayDate) {
  const color      = (grade === 'gr6') ? 'terra' : 'sky';
  const cardClass  = (grade === 'gr6') ? 'terra-card' : 'sky-card';
  const label      = (grade === 'gr6') ? '6TH GRADE — LANGUAGE ARTS' : '8TH GRADE — LANGUAGE ARTS';
  const unitNum    = weekObj.unit;
  const weekAnchorNum = parseInt(weekObj.weekAnchor.replace(/[^0-9]/g,'')) || 1;
  const progress   = Math.round(((CURR[grade].indexOf(weekObj)) / 35) * 100);

  let rows = '';
  for (let di = 0; di < 5; di++) {
    const day      = weekObj.days[di];
    const dayDate  = addDays(mondayDate, di);
    const dayKey   = dateKey(dayDate);
    const doneKey  = 'ck_' + grade + '_done_' + dayKey;
    const isDone   = !!localStorage.getItem(doneKey);
    const isToday  = todayDate && dayDate.getTime() === todayDate.getTime();

    let rowClass = '';
    if (isToday) rowClass += ' is-today';
    if (isDone)  rowClass += ' is-done';

    const checkMark = isDone ? '<span class="done-check">&#10003;</span>' : '';
    const tagClass  = getTagClass(day.tag);

    let linkUrl = weekObj.unitFile + weekObj.weekAnchor;

    rows += `<tr class="${rowClass.trim()}">
      <td class="day-name-cell">
        <div class="day-name">${DAY_NAMES[di].slice(0,3)}</div>
        ${checkMark}
      </td>
      <td class="tag-cell"><span class="tag-pill ${tagClass}">${day.tag}</span></td>
      <td class="task-cell"><span class="day-task-text">${day.task}</span></td>
      <td class="link-cell">
        <a class="open-link" href="${linkUrl}" title="Open lesson">&#8594;</a>
      </td>
    </tr>`;
  }

  return `<div class="week-card ${cardClass}">
    <div class="week-card-header ${color}">
      <div class="week-card-grade">${label}</div>
      <div class="week-card-meta">Unit ${unitNum} of 6 &middot; Week ${weekAnchorNum} of 6</div>
      <div class="week-card-unit-title">${weekObj.unitName} &middot; ${weekObj.weekTitle}</div>
    </div>
    <div class="card-progress-bar">
      <div class="card-progress-bar-fill" style="width:${progress}%"></div>
    </div>
    <table class="day-table">${rows}</table>
  </div>`;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function renderPage() {
  const main      = document.getElementById('main-content');
  const today     = todayLocal();
  const subText   = document.getElementById('week-sub-text');
  const weekLabel = document.getElementById('week-label');
  const btnPrev   = document.getElementById('btn-prev-week');
  const btnNext   = document.getElementById('btn-next-week');
  const btnThis   = document.getElementById('btn-this-week');
  const progWrap  = document.getElementById('year-progress-wrap');
  const progFill  = document.getElementById('year-progress-fill');
  const progPct   = document.getElementById('year-progress-pct');
  const banner    = document.getElementById('offset-banner');

  const startStr = localStorage.getItem('ck_year_start');

  // If no year start, show setup
  if (!startStr) {
    progWrap.style.display = 'none';
    banner.style.display = 'none';
    subText.textContent = 'School year not configured';
    weekLabel.textContent = 'Week —';
    main.innerHTML = `<div class="setup-banner">
      <div>
        <p>Before we start, when does your school year begin?</p>
        <label for="setup-date">School year start date</label>
        <input type="date" id="setup-date" value="2026-09-01">
        <button class="btn-primary" onclick="saveStartDate()">Start School Year</button>
      </div>
    </div>`;
    return;
  }

  const start       = parseLocalDate(startStr);
  const yearEnd     = addDays(start, 251); // ~36 weeks of Mon-Fri ≈ 180 school days spread over ~252 calendar days

  // Find current week index (what school week is TODAY in?)
  let currentWeekIdx = 0;
  let todayIsSchoolDay = false;
  if (today >= start) {
    const dow = today.getDay();
    todayIsSchoolDay = (dow >= 1 && dow <= 5);
    // Find the Monday of the current calendar week
    const currentMonday = getMondayOf(today);
    const sdFromStart = countSchoolDays(start, currentMonday) - 1; // school days elapsed up to and including Monday
    // If monday is before start, we're on week 0
    if (currentMonday < start) {
      currentWeekIdx = 0;
    } else {
      const daysElapsedMon = countSchoolDays(start, currentMonday);
      currentWeekIdx = Math.floor((daysElapsedMon - 1) / 5);
      if (currentWeekIdx < 0) currentWeekIdx = 0;
    }
  }

  // Apply offset
  let displayWeekIdx = currentWeekIdx + weekOffset;
  displayWeekIdx = Math.max(0, Math.min(35, displayWeekIdx));

  // Update navigation buttons
  btnPrev.disabled  = displayWeekIdx <= 0;
  btnNext.disabled  = displayWeekIdx >= 35;
  btnThis.style.display = (weekOffset !== 0) ? 'inline-flex' : 'none';

  // Compute Monday/Friday for the displayed week
  // The Nth week (0-based) starts from the first school Monday
  // We find the calendar Monday that corresponds to weekIndex
  // Start from year start, advance by displayWeekIdx * 7 calendar days roughly
  // Better: find start-of-school monday and add weeks
  const schoolMonday = getMondayOf(start); // the Monday on or before school start
  // Actually if start is a Wednesday, first school day week is that week
  // The first "school week" is the week containing the start date
  // Week 0's Monday = getMondayOf(start)
  const week0Monday = getMondayOf(start);
  const displayMonday = addDays(week0Monday, displayWeekIdx * 7);
  const displayFriday = addDays(displayMonday, 4);

  // Week number label (1-based)
  const weekNum = displayWeekIdx + 1;
  weekLabel.textContent = 'Week ' + weekNum + ' of 36';

  const dateRange = formatDateRange(displayMonday, displayFriday);
  subText.textContent = 'Week ' + weekNum + ' of 36 · ' + dateRange;

  // Offset banner
  if (weekOffset > 0) {
    banner.style.display = 'block';
    banner.className = 'preview-banner future';
    banner.textContent = '▶ Looking ahead: Week ' + weekNum + ' (' + dateRange + ')';
  } else if (weekOffset < 0) {
    banner.style.display = 'block';
    banner.className = 'preview-banner';
    banner.textContent = '◄ Looking back: Week ' + weekNum + ' (' + dateRange + ')';
  } else {
    banner.style.display = 'none';
  }

  // Year progress
  if (today >= start) {
    const totalSchoolDays = 180;
    const elapsed = Math.min(countSchoolDays(start, today), totalSchoolDays);
    const pct = Math.round((elapsed / totalSchoolDays) * 100);
    progWrap.style.display = 'block';
    progFill.style.width = pct + '%';
    progPct.textContent = pct + '% complete · Day ' + elapsed + ' of 180';
  } else {
    progWrap.style.display = 'none';
  }

  // Check edge cases for CURRENT week display
  if (weekOffset === 0 && today < start) {
    // Before school starts — show preview of week 1 with a note
    const diffMs   = start - today;
    const diffDays = Math.ceil(diffMs / 86400000);
    main.innerHTML = `<div class="status-msg" style="margin-bottom:24px;">
      <div class="emoji">&#128197;</div>
      <h2>School starts ${MONTHS[start.getMonth()]} ${start.getDate()}, ${start.getFullYear()}</h2>
      <p>${diffDays} day${diffDays !== 1 ? 's' : ''} to go &mdash; here's a preview of Week 1:</p>
    </div>
    <div class="grades-wrap">
      ${renderWeekTable('gr6', CURR.gr6[0], week0Monday, null)}
      ${renderWeekTable('gr8', CURR.gr8[0], week0Monday, null)}
    </div>`;
    return;
  }

  if (displayWeekIdx > 35) {
    main.innerHTML = `<div class="status-msg"><div class="emoji">&#127881;</div>
      <h2>School year complete!</h2>
      <p>No more weeks in the curriculum. Incredible work this year!</p></div>`;
    return;
  }

  const gr6Week = CURR.gr6[displayWeekIdx];
  const gr8Week = CURR.gr8[displayWeekIdx];

  // Only highlight today if offset = 0 (we're showing the current week)
  const todayForHighlight = (weekOffset === 0) ? today : null;

  main.innerHTML = `<div class="grades-wrap">
    ${renderWeekTable('gr6', gr6Week, displayMonday, todayForHighlight)}
    ${renderWeekTable('gr8', gr8Week, displayMonday, todayForHighlight)}
  </div>`;
}

}
